<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UserAccess — Login</title>
  <meta name="description" content="Sign in to the NYCEM UserAccess Management Portal" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="login-page">
    <div class="login-bg-orb orb1"></div>
    <div class="login-bg-orb orb2"></div>

    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-icon">UA</div>
        <h1>UserAccess</h1>
        <p>NYC Emergency Management Portal</p>
      </div>

      <!-- Microsoft SSO Button (stub) -->
      <button class="login-sso-btn" id="btn-ms-sso" onclick="handleMSSO()">
        <svg width="20" height="20" viewBox="0 0 21 21" fill="none">
          <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
          <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
          <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
          <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
        </svg>
        Sign in with Microsoft
      </button>

      <div class="login-divider">or use dev credentials</div>
      <div class="login-form-title">Development / Stub Login</div>

      <div id="login-error" class="login-error hidden"></div>

      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input class="form-control" id="username" type="text" placeholder="admin" value="admin" autocomplete="username" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-control" id="password" type="password" placeholder="••••••" value="admin" autocomplete="current-password" required />
        </div>
        <button class="btn btn-primary w-full" type="submit" id="btn-login" style="height:44px;font-size:15px;">
          Sign In
        </button>
      </form>

      <p style="text-align:center;font-size:11.5px;color:var(--text-muted);margin-top:24px;">
        🔒 Secured · NYCEM Internal Use Only
      </p>
    </div>
  </div>

  <script>
    const API = 'http://127.0.0.1:8000';

    function handleMSSO() {
      // Stub: just log in as admin
      document.getElementById('username').value = 'admin';
      document.getElementById('password').value = 'admin';
      document.getElementById('login-form').requestSubmit();
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('btn-login');
      const errBox = document.getElementById('login-error');
      errBox.classList.add('hidden');
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      const body = new URLSearchParams({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value,
      });

      try {
        const res = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body,
        });
        if (!res.ok) throw new Error((await res.json()).detail || 'Login failed');
        const data = await res.json();
        localStorage.setItem('ua_token', data.access_token);
        localStorage.setItem('ua_user', JSON.stringify(data.user));
        window.location.href = 'index.html';
      } catch (err) {
        errBox.textContent = err.message;
        errBox.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }

    // Redirect if already logged in
    if (localStorage.getItem('ua_token')) window.location.href = 'index.html';
  </script>
</body>
</html>
